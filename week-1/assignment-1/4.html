<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4-more-complicated-grid-layout</title>
    <style>
        .container{
            width:1200px;
            margin:0 auto;
            display:grid;
            grid-template-columns:1fr 2fr;
            gap:10px;
        }
        .left{
            background-color:red;
            height:50px
        }
        .right{
            background-color:blue;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <h1>left</h1>
            <p>text text text text text text text text text text</p>
        </div>
        <div class="right">right</div>

    </div>
</body>
</html>
